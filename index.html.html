// ─── JSONBlob API (free, no signup, anonymous) ───
const API="https://jsonblob.com/api/jsonBlob";
let blobId=location.hash.replace("#","")||null;
let pollInterval=null;
let lastSync=0;

async function createRoom(){
  const r=await fetch(API,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Accept":"application/json"
    },
    body:JSON.stringify({users:{},created:Date.now()})
  });
  
  if(!r.ok) throw new Error("Failed to create room");
  
  // Browsers often hide the "Location" header due to CORS, so we check "x-jsonblob" first
  const loc = r.headers.get("Location") || r.headers.get("location");
  const xBlob = r.headers.get("x-jsonblob") || r.headers.get("x-jsonblob-id") || r.headers.get("X-Jsonblob");
  
  let id = xBlob;
  if (!id && loc) {
    id = loc.split("/").pop();
  }
  
  if (!id) throw new Error("Could not extract Room ID from headers.");
  
  return id;
}

async function fetchRoom(){
  if(!blobId)return null;
  try{
    const r=await fetch(API+"/"+blobId,{headers:{"Accept":"application/json"}});
    if(!r.ok)return null;
    return await r.json();
  }catch(e){return null}
}

async function saveRoom(data){
  if(!blobId)return;
  try{
    await fetch(API+"/"+blobId,{method:"PUT",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(data)});
  }catch(e){console.error("Save failed",e)}
}

const COL={ACT:{bg:"#E8F0FE",border:"#4285F4",text:"#1A56DB",cal:"#4285F4"},FIN:{bg:"#FEF3E2",border:"#F59E0B",text:"#B45309",cal:"#F59E0B"},ISOM:{bg:"#E8FAF0",border:"#34D399",text:"#047857",cal:"#10B981"},MKT:{bg:"#FDE8F0",border:"#EC4899",text:"#BE185D",cal:"#EC4899"},OAM:{bg:"#F0E8FE",border:"#8B5CF6",text:"#6D28D9",cal:"#8B5CF6"}};
const AVC=["#4285F4","#EA4335","#FBBC04","#34A853","#FF6D01","#46BDC6","#7B61FF","#F538A0","#00BFA5","#FF6E40","#AA66CC","#2196F3","#E91E63","#9C27B0","#009688","#FF5722"];
function hc(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return AVC[Math.abs(h)%AVC.length]}
function ini(n){return n.split(/\s+/).map(w=>w[0]).join("").toUpperCase().slice(0,2)}

function parseTime(s){const m=s.match(/(\d+):?(\d*)([ap]m)/i);if(!m)return 0;let h=parseInt(m[1]),min=m[2]?parseInt(m[2]):0;if(m[3].toLowerCase()==="pm"&&h!==12)h+=12;if(m[3].toLowerCase()==="am"&&h===12)h=0;return h*60+min}
function parsePattern(p){const tp=p.match(/\d+:?\d*[ap]m\s*-\s*\d+:?\d*[ap]m/i);if(!tp)return[];const[ss,es]=tp[0].split("-").map(s=>s.trim());const start=parseTime(ss),end=parseTime(es);const ds=p.replace(tp[0],"").trim();if(ds==="TTh")return[{day:"Tue",start,end},{day:"Thu",start,end}];if(ds==="MW")return[{day:"Mon",start,end},{day:"Wed",start,end}];if(ds==="Tu")return[{day:"Tue",start,end}];if(ds==="M")return[{day:"Mon",start,end}];if(ds==="W")return[{day:"Wed",start,end}];if(ds==="Th")return[{day:"Thu",start,end}];return[]}
function fmtMin(m){const h=Math.floor(m/60),min=m%60,ap=h>=12?"pm":"am";return`${h>12?h-12:h===0?12:h}:${String(min).padStart(2,"0")}${ap}`}
COURSES.forEach(c=>{c.slots=parsePattern(c.pattern)});

const DAYS=["Mon","Tue","Wed","Thu"],SH=8,EH=22;

// ─── State ───
let userName="",userId="",selected=new Set(),room={users:{}},view="list",search="",filterSubj="ALL",filterTime="ALL",sortBy="subj",expandedCourse=null;
let saveTimer=null,pendingSave=false;

function getConflicts(){const sel=COURSES.filter(c=>selected.has(c.id)),pairs=[];for(let i=0;i<sel.length;i++)for(let j=i+1;j<sel.length;j++){for(const a of sel[i].slots)for(const b of sel[j].slots)if(a.day===b.day&&a.start<b.end&&b.start<a.end){pairs.push([sel[i],sel[j]]);break}}return pairs}
function getConfIds(){const s=new Set();getConflicts().forEach(([a,b])=>{s.add(a.id);s.add(b.id)});return s}
function sanitizeKey(name){return name.toLowerCase().replace(/[^a-z0-9]/g,"_")+"_"+Math.random().toString(36).slice(2,6)}

async function pushUpdate(){
  if(!userName||!blobId)return;
  if(!room.users)room.users={};
  room.users[userId]={name:userName,courses:[...selected],updated:Date.now()};
  await saveRoom(room);
}

function debouncedPush(){
  if(saveTimer)clearTimeout(saveTimer);
  pendingSave=true;
  saveTimer=setTimeout(async()=>{await pushUpdate();pendingSave=false},500);
}

async function pollRoom(){
  if(pendingSave)return;
  const data=await fetchRoom();
  if(data){
    room=data;
    if(!room.users)room.users={};
    render();
  }
}

function startApp(){
  const v=document.getElementById("name-input").value.trim();
  if(!v)return;
  userName=v;
  userId=sanitizeKey(v);
  try{localStorage.setItem("gbs_user_"+blobId,JSON.stringify({name:userName,id:userId,selected:[...selected]}))}catch(e){}
  pushUpdate();
  render();
}

function loadLocal(){
  if(!blobId)return;
  try{const d=JSON.parse(localStorage.getItem("gbs_user_"+blobId));if(d){userName=d.name;userId=d.id;selected=new Set(d.selected||[])}}catch(e){}
}

function saveLocal(){
  if(!blobId||!userName)return;
  try{localStorage.setItem("gbs_user_"+blobId,JSON.stringify({name:userName,id:userId,selected:[...selected]}))}catch(e){}
}

function switchView(v){view=v;render()}
function toggle(id){selected.has(id)?selected.delete(id):selected.add(id);saveLocal();debouncedPush();render()}

function toast(msg){const el=document.createElement("div");el.className="toast";el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2500)}

function copyShareLink(){
  const url=location.href;
  navigator.clipboard.writeText(url).then(()=>toast("Link copied! 🎉")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();toast("Link copied!");
  });
}

function shareWA(){
  const url=location.href;
  const text=`Fall 2026 elective planning 📚 We're picking courses together — open this link, add your name, and we'll all see who's taking what:\n\n${url}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,"_blank");
}

// ─── Renderers ───
function render(){
  const app=document.getElementById("app");
  if(!userName){app.innerHTML=renderOnboard();return}

  const conf=getConflicts(),confIds=getConfIds();
  const sel=COURSES.filter(c=>selected.has(c.id));
  let hrs=0;sel.forEach(c=>c.slots.forEach(s=>hrs+=s.end-s.start));hrs=(hrs/60).toFixed(1);

  const matesByCourse={};
  COURSES.forEach(c=>{matesByCourse[c.id]=[]});
  Object.entries(room.users||{}).forEach(([uid,u])=>{
    if(uid===userId||!u||!u.courses)return;
    u.courses.forEach(cid=>{if(matesByCourse[cid])matesByCourse[cid].push(u.name)});
  });

  const totalUsers=Object.keys(room.users||{}).length;

  let html=`
  <div class="header"><div class="header-inner">
    <div><span class="logo">Fall 2026</span><span class="badge">Goizueta</span></div>
    <div class="user-area">
      <div class="live-pill"><div class="live-dot"></div><span style="font-size:10px;color:#aaa">${totalUsers} live</span></div>
      <div class="avatar" style="background:${hc(userName)}">${ini(userName)}</div>
      <span style="font-size:12px;font-weight:600;color:#fff">${userName}</span>
    </div>
  </div></div>
  <div class="stats"><div class="stats-inner">
    <div><span class="stat-n">${selected.size}</span><span class="stat-l">courses</span></div>
    <div class="stat-d"></div>
    <div><span class="stat-n">${hrs}</span><span class="stat-l">hrs/wk</span></div>
    <div class="stat-d"></div>
    <div><span class="stat-n" style="color:${conf.length>0?"#EF4444":"#10B981"}">${conf.length}</span><span class="stat-l">conflicts</span></div>
    <div class="tabs">
      <button class="tab ${view==="list"?"on":""}" onclick="switchView('list')">Courses</button>
      <button class="tab ${view==="calendar"?"on":""}" onclick="switchView('calendar')">Week</button>
      <button class="tab ${view==="social"?"on":""}" onclick="switchView('social')">Classmates</button>
    </div>
  </div></div>
  <div class="main">`;

  conf.forEach(([a,b])=>{
    html+=`<div class="conflict-alert"><span>⚠️</span><span style="font-size:12px;color:#991B1B;flex:1"><strong>${a.subj} ${a.cat}</strong> overlaps <strong>${b.subj} ${b.cat}</strong></span>
    <button class="drop-btn" onclick="toggle('${b.id}')">Drop ${b.subj} ${b.cat}</button>
    <button class="drop-btn" onclick="toggle('${a.id}')">Drop ${a.subj} ${a.cat}</button></div>`;
  });

  if(view==="list")html+=renderList(sel,confIds,matesByCourse);
  else if(view==="calendar")html+=renderCalendar(sel,confIds,matesByCourse);
  else html+=renderSocial(matesByCourse);

  html+=`</div>`;
  app.innerHTML=html;
}

function renderOnboard(){
  const totalUsers=Object.keys(room.users||{}).length;
  const userList=Object.values(room.users||{}).map(u=>u.name).slice(0,5).join(", ");
  return`<div class="onboard"><div class="onboard-box">
    <div style="font-size:48px;margin-bottom:16px">📚</div>
    <h1>Fall 2026 Schedule Solver</h1>
    <p>Goizueta Business School<br>Pick your courses. See who's taking them in real-time.</p>
    <div class="row">
      <input type="text" id="name-input" placeholder="Enter your name..." onkeydown="if(event.key==='Enter')startApp()" autofocus>
      <button onclick="startApp()">Go</button>
    </div>
    ${totalUsers>0?`<div class="room-info">🟢 ${totalUsers} ${totalUsers===1?"person is":"people are"} already in this room${userList?": "+userList:""}${totalUsers>5?" + others":""}</div>`:'<div class="room-info">You\'re the first one here — share the link to invite friends!</div>'}
  </div></div>`;
}

function renderList(sel,confIds,matesByCourse){
  const subjs=[...new Set(COURSES.map(c=>c.subj))].sort();
  let filtered=COURSES.filter(c=>{
    if(filterSubj!=="ALL"&&c.subj!==filterSubj)return false;
    if(search&&!`${c.title} ${c.subj} ${c.cat} ${c.professor}`.toLowerCase().includes(search.toLowerCase()))return false;
    if(filterTime==="DAY"&&c.slots.some(s=>s.start>=18*60))return false;
    if(filterTime==="EVE"&&c.slots.every(s=>s.start<18*60))return false;
    return true;
  });
  if(sortBy==="popular")filtered.sort((a,b)=>(matesByCourse[b.id]?.length||0)-(matesByCourse[a.id]?.length||0));
  else if(sortBy==="time")filtered.sort((a,b)=>(a.slots[0]?.start||0)-(b.slots[0]?.start||0));
  else filtered.sort((a,b)=>a.subj.localeCompare(b.subj)||a.cat.localeCompare(b.cat));

  let h=`<div class="grid"><div>
    <div class="filters">
      <input type="text" placeholder="Search courses, professors..." value="${search}" oninput="search=this.value;render()">
      <select onchange="filterSubj=this.value;render()">
        <option value="ALL"${filterSubj==="ALL"?" selected":""}>All Subjects</option>
        ${subjs.map(s=>`<option value="${s}"${filterSubj===s?" selected":""}>${s}</option>`).join("")}
      </select>
      <select onchange="filterTime=this.value;render()">
        <option value="ALL"${filterTime==="ALL"?" selected":""}>All Times</option>
        <option value="DAY"${filterTime==="DAY"?" selected":""}>Daytime</option>
        <option value="EVE"${filterTime==="EVE"?" selected":""}>Evening</option>
      </select>
    </div>
    <div class="sort-bar"><span class="sort-label">Sort:</span>
      ${[["subj","Subject"],["time","Time"],["popular","Popular"]].map(([k,l])=>`<button class="sort-btn ${sortBy===k?"on":""}" onclick="sortBy='${k}';render()">${l}</button>`).join("")}
    </div>
    <div class="course-list">`;

  if(!filtered.length)h+=`<div style="padding:30px;text-align:center;color:#999;font-size:12px">No courses match filters.</div>`;
  filtered.forEach((c,i)=>{
    const isSel=selected.has(c.id),col=COL[c.subj]||COL.OAM,isConf=confIds.has(c.id);
    const mates=matesByCourse[c.id]||[];
    const isExp=expandedCourse===c.id;
    h+=`<div class="cr${isSel?" sel":""}" style="--bc:${col.border};--bbg:${col.bg}" onclick="toggle('${c.id}')">
      <div class="cbox">${isSel?'<span style="color:#fff;font-size:11px;font-weight:700">✓</span>':''}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="chip" style="background:${col.bg};color:${col.text}">${c.subj} ${c.cat}</span>
          <span class="c-title">${c.title}</span>
          ${isConf?'<span class="conf-badge">CONFLICT</span>':''}
        </div>
        <div class="c-meta">${c.professor}<span class="dot">·</span>${c.pattern}<span class="dot">·</span>${c.location}</div>
      </div>
      ${mates.length>0?`<div class="mates-badge" onclick="event.stopPropagation();expandedCourse=expandedCourse==='${c.id}'?null:'${c.id}';render()">
        ${mates.slice(0,3).map(n=>`<div class="mini-av" style="background:${hc(n)}">${ini(n)[0]}</div>`).join("")}
        <span class="mates-count">${mates.length}</span>
      </div>`:''}
    </div>`;
    if(isExp&&mates.length>0){
      h+=`<div class="expanded"><div class="exp-label">Also taking this</div>`;
      mates.forEach(n=>{h+=`<div class="mate-row"><div class="av-sm" style="background:${hc(n)}">${ini(n)}</div><span>${n}</span></div>`});
      h+=`</div>`;
    }
  });

  h+=`</div></div><div><div class="sidebar"><h3>My Schedule (${sel.length})</h3>`;
  if(!sel.length)h+=`<div class="side-empty">Click courses to build your schedule.</div>`;
  sel.forEach(c=>{
    const col=COL[c.subj]||COL.OAM;
    const mates=matesByCourse[c.id]||[];
    h+=`<div class="side-card" style="background:${col.bg};border-left:3px solid ${col.border}">
      <div style="flex:1"><div class="code" style="color:${col.text}">${c.subj} ${c.cat}</div><div class="time">${c.pattern}</div></div>
      ${mates.length>0?`<div style="display:flex">${mates.slice(0,2).map(n=>`<div style="width:18px;height:18px;border-radius:50%;background:${hc(n)};display:flex;align-items:center;justify-content:center;color:#fff;font-size:7px;font-weight:700;margin-left:-4px;border:2px solid ${col.bg}">${ini(n)[0]}</div>`).join("")}</div>`:''}
      ${confIds.has(c.id)?'<span style="font-size:11px">⚠️</span>':''}
      <button class="rm" onclick="event.stopPropagation();toggle('${c.id}')">×</button>
    </div>`;
  });
  if(sel.length)h+=`<button class="view-cal" onclick="switchView('calendar')">View Week Calendar →</button>`;
  h+=`</div></div></div>`;
  return h;
}

function renderCalendar(sel,confIds,matesByCourse){
  if(!sel.length)return`<div class="calendar"><div class="cal-empty"><p style="font-size:15px;font-weight:600;margin-bottom:4px">No courses selected</p><p style="font-size:12px;color:#888">Switch to Courses and pick some classes.</p></div></div>`;

  const totalMin=(EH-SH)*60,bodyH=totalMin*0.72;
  let timeLabels="",gridLines="";
  for(let i=0;i<EH-SH;i++){
    const h=SH+i,top=(i/(EH-SH))*100;
    timeLabels+=`<div class="cal-time-lbl" style="top:${top}%">${h>12?h-12:h}${h>=12?"p":"a"}</div>`;
    gridLines+=`<div class="cal-line" style="top:${top}%"></div>`;
  }

  let dayCols=DAYS.map(day=>{
    let blocks="";
    sel.forEach(c=>{
      const col=COL[c.subj]||COL.OAM;
      const mates=matesByCourse[c.id]||[];
      c.slots.filter(s=>s.day===day).forEach(s=>{
        const top=((s.start-SH*60)/totalMin)*100,h=((s.end-s.start)/totalMin)*100;
        const isConf=confIds.has(c.id);
        blocks+=`<div class="cal-block${isConf?" conf":""}" style="top:${top}%;height:${h}%;background:linear-gradient(135deg,${col.cal},${col.cal}dd);${!isConf?"box-shadow:0 1px 3px rgba(0,0,0,.1)":""}">
          <div class="b-code">${c.subj} ${c.cat}</div>
          <div class="b-title">${c.title}</div>
          <div class="b-loc">${c.location}</div>
          <div class="b-time">${fmtMin(s.start)}–${fmtMin(s.end)}</div>
          ${mates.length>0?`<div style="margin-top:2px;display:flex;align-items:center;gap:2px">${mates.slice(0,2).map(n=>`<div style="width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700">${ini(n)[0]}</div>`).join("")}${mates.length>2?`<span style="font-size:7px;opacity:.8">+${mates.length-2}</span>`:""}</div>`:""}
        </div>`;
      });
    });
    return`<div class="cal-day-col"><div class="cal-day-hdr">${day.toUpperCase()}</div><div class="cal-body" style="height:${bodyH}px">${gridLines}${blocks}</div></div>`;
  }).join("");

  let legend=Object.entries(COL).map(([k,v])=>`<div class="legend-item"><div class="legend-dot" style="background:${v.cal}"></div>${k}</div>`).join("");

  return`<div class="calendar"><div class="cal-grid">
    <div class="cal-time-col"><div class="cal-day-hdr" style="font-size:10px;color:#999">TIME</div><div class="cal-body" style="height:${bodyH}px;position:relative">${timeLabels}</div></div>
    ${dayCols}
  </div><div class="legend">${legend}</div></div>`;
}

function renderSocial(matesByCourse){
  const popular=COURSES.map(c=>({...c,count:(matesByCourse[c.id]||[]).length+(selected.has(c.id)?1:0)})).filter(c=>c.count>0).sort((a,b)=>b.count-a.count).slice(0,8);

  const myIds=new Set(selected);
  const overlaps=Object.entries(room.users||{}).filter(([uid])=>uid!==userId).map(([uid,u])=>{
    const shared=(u.courses||[]).filter(id=>myIds.has(id));
    return{name:u.name,shared,total:(u.courses||[]).length};
  }).filter(u=>u.shared.length>0).sort((a,b)=>b.shared.length-a.shared.length);

  let h=`<div class="share-card">
    <h3>🔗 Share this room</h3>
    <p>Anyone with this link will see everyone's picks live</p>
    <div class="share-url">${location.href}</div>
    <div class="share-row">
      <button class="sb-primary" onclick="copyShareLink()">Copy Link</button>
      <button class="sb-wa" onclick="shareWA()">Share via WhatsApp</button>
    </div>
  </div>`;

  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">`;

  h+=`<div class="panel"><h3>🔥 Most Popular</h3><p class="sub">Courses with the most interest</p>`;
  if(!popular.length)h+=`<div style="text-align:center;padding:20px;color:#bbb;font-size:12px">No picks yet — be the first!</div>`;
  popular.forEach((c,i)=>{
    const col=COL[c.subj]||COL.OAM,mates=matesByCourse[c.id]||[],isSel=selected.has(c.id);
    h+=`<div class="pop-row">
      <div class="rank" style="background:${col.bg};color:${col.text}">${i+1}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:5px"><span class="chip" style="background:${col.bg};color:${col.text}">${c.subj} ${c.cat}</span><span style="font-size:12px;font-weight:600">${c.title}</span></div>
        <div style="margin-top:3px;display:flex;align-items:center;gap:6px">${mates.slice(0,5).map(n=>`<div class="mini-av" style="background:${hc(n)}">${ini(n)[0]}</div>`).join("")}<span style="font-size:10px;color:#888;margin-left:2px">${c.count} interested</span></div>
      </div>
      <button class="add-btn ${isSel?"added":""}" style="${isSel?`background:${col.border}`:""}" onclick="toggle('${c.id}')">${isSel?"✓ Added":"+ Add"}</button>
    </div>`;
  });
  h+=`</div>`;

  h+=`<div class="panel"><h3>👥 Your Classmates</h3><p class="sub">People with overlapping picks</p>`;
  if(!overlaps.length)h+=`<div style="text-align:center;padding:24px"><div style="font-size:32px;margin-bottom:8px">🤝</div><p style="font-size:12px;color:#bbb">${selected.size===0?"Pick courses to find classmates":"No overlap yet — share the link to invite friends!"}</p></div>`;
  overlaps.forEach((u,i)=>{
    h+=`<div class="friend-row">
      <div class="av-md" style="background:${hc(u.name)}">${ini(u.name)}</div>
      <div class="info"><div class="name">${u.name}</div><div class="meta">${u.total} courses planned</div></div>
      <div style="text-align:right"><div class="shared-num">${u.shared.length}</div><div class="shared-lbl">shared</div></div>
    </div>`;
  });
  h+=`</div></div>`;

  return h;
}

// ─── Init ───
async function init(){
  if(!blobId){
    try{
      blobId=await createRoom();
      location.hash=blobId;
      toast("Room created! Share the link 🎉");
    }catch(e){
      console.error("Room creation error:", e);
      document.getElementById("app").innerHTML=`<div class="loading"><div>⚠️ Couldn't create room. Refresh to try again.</div></div>`;
      return;
    }
  }
  loadLocal();
  const data=await fetchRoom();
  if(data){room=data;if(!room.users)room.users={}}
  render();
  pollInterval=setInterval(pollRoom,3000);
}

window.addEventListener("hashchange",()=>{
  blobId=location.hash.replace("#","")||null;
  if(blobId){location.reload()}
});

init();
</script>
</body>
</html>
